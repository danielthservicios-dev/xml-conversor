<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'; img-src 'self' data:;">
  <title>SAT XML Conversor</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>SAT XML Conversor</h1>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-tab="clientes">Clientes</button>
      <button class="tab-btn" data-tab="descargar">Descargar XML</button>
      <button class="tab-btn" data-tab="convertir">Convertir a Excel</button>
    </nav>

    <section id="tab-clientes" class="tab-content active">
      <h2>Gestión de Clientes</h2>
      <div class="client-form">
        <div class="form-row">
          <label>RFC:</label>
          <input type="text" id="cli-rfc" placeholder="Ej: AAA010101AAA" />
        </div>
        <div class="form-row">
          <label>Razón Social:</label>
          <input type="text" id="cli-razon" placeholder="Nombre del cliente" />
        </div>
        <div class="form-row">
          <label>Certificado .cer:</label>
          <div class="file-input">
            <input type="text" id="cli-cer" placeholder="Seleccionar archivo .cer" readonly />
            <button class="btn small" id="cli-btn-cer">Examinar</button>
          </div>
        </div>
        <div class="form-row">
          <label>Llave .key:</label>
          <div class="file-input">
            <input type="text" id="cli-key" placeholder="Seleccionar archivo .key" readonly />
            <button class="btn small" id="cli-btn-key">Examinar</button>
          </div>
        </div>
        <div class="form-row">
          <label>Password:</label>
          <input type="password" id="cli-password" placeholder="Contraseña de la llave" />
        </div>
        <div class="form-row">
          <label>Carpeta descarga:</label>
          <div class="file-input">
            <input type="text" id="cli-descarga" placeholder="Ruta por defecto (opcional)" readonly />
            <button class="btn small" id="cli-btn-descarga">Examinar</button>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="cli-btn-save">Guardar</button>
          <button class="btn" id="cli-btn-clear">Limpiar</button>
          <button class="btn danger" id="cli-btn-delete" disabled>Eliminar</button>
        </div>
      </div>
      <div class="client-list">
        <h3>Clientes registrados</h3>
        <table id="cli-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>RFC</th>
              <th>Razón Social</th>
              <th>Certificado</th>
              <th>Llave</th>
            </tr>
          </thead>
          <tbody id="cli-tbody"></tbody>
        </table>
      </div>
    </section>

    <section id="tab-descargar" class="tab-content">
      <h2>Descarga de XML desde el SAT</h2>
      <div class="download-form">
        <div class="form-row">
          <label>Cliente:</label>
          <select id="dl-cliente"><option value="">Seleccionar...</option></select>
          <button class="btn small" id="dl-btn-refresh">↻</button>
        </div>
        <div class="form-row">
          <label>RFC:</label>
          <span id="dl-rfc"></span>
        </div>
        <div class="form-row">
          <label>Certificado:</label>
          <span id="dl-cer"></span>
        </div>
        <div class="form-row">
          <label>Llave .key:</label>
          <span id="dl-key"></span>
        </div>
        <div class="form-row">
          <label>Password:</label>
          <span id="dl-password"></span>
        </div>
        <div class="form-row">
          <label>Tipo:</label>
          <div class="radio-group">
            <label><input type="radio" name="tipo" value="emitidas" checked /> Emitidas</label>
            <label><input type="radio" name="tipo" value="recibidas" /> Recibidas</label>
            <label><input type="radio" name="tipo" value="ambas" /> Ambas</label>
          </div>
        </div>
        <div class="form-row periodo">
          <label>Desde:</label>
          <select id="dl-desde-mes"></select>
          <select id="dl-desde-anio"></select>
          <label class="sep">Hasta:</label>
          <select id="dl-hasta-mes"></select>
          <select id="dl-hasta-anio"></select>
        </div>
        <div class="form-row">
          <label>Carpeta destino:</label>
          <div class="file-input">
            <input type="text" id="dl-folder" placeholder="Seleccionar carpeta (opcional)" readonly />
            <button class="btn small" id="dl-btn-folder">Examinar</button>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="dl-btn-start" disabled>Iniciar Descarga SAT</button>
          <button class="btn primary" id="dl-btn-convert" disabled>Descargar y Convertir</button>
          <button class="btn" id="dl-btn-retrieve" disabled>Recuperar descargas</button>
          <button class="btn" id="dl-btn-clear">Vaciar Formulario</button>
          <span id="dl-status"></span>
        </div>
        <div class="progress-container">
          <progress id="dl-progress" max="100" value="0"></progress>
          <span id="dl-progress-text">0/0</span>
        </div>
      </div>
      <div class="log-box">
        <textarea id="dl-log" readonly placeholder="Log de descarga..."></textarea>
      </div>
    </section>

    <section id="tab-convertir" class="tab-content">
      <h2>Convertir XML a Excel</h2>
      <div class="convert-form">
        <button class="btn" id="cv-btn-recent">Cargar última carpeta de descarga</button>
        <div class="form-row">
          <label>Carpeta con XMLs:</label>
          <div class="file-input">
            <input type="text" id="cv-input" placeholder="Seleccionar carpeta" readonly />
            <button class="btn small" id="cv-btn-input">Examinar</button>
          </div>
        </div>
        <div class="form-row">
          <label>Destino Excel:</label>
          <div class="file-input">
            <input type="text" id="cv-output" placeholder="Seleccionar carpeta de destino" readonly />
            <button class="btn small" id="cv-btn-output">Examinar</button>
          </div>
        </div>
        <div class="form-row">
          <label>Tipo de conversión:</label>
          <div class="radio-group">
            <label><input type="radio" name="cv-mode" value="general" checked /> General (todos los CFDI)</label>
            <label><input type="radio" name="cv-mode" value="pagos" /> Solo Complementos de Pago</label>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="cv-btn-convert" disabled>Convertir a Excel</button>
          <span id="cv-status"></span>
        </div>
      </div>
      <div class="log-box">
        <textarea id="cv-log" readonly placeholder="Log de conversión..."></textarea>
      </div>
      <div class="progress-container">
        <div class="progress-bar" id="cv-progress"><span></span></div>
      </div>
    </section>
  </div>

  <script src="renderer.js"></script>
</body>
</html>
